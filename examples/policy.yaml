# Expected-claims policy for a production deploy job.
# Any claim that does not match is a finding; the tool exits non-zero so a
# workflow step can gate on it. See the README for the full schema.
issuer: https://token.actions.githubusercontent.com
audience: sts.amazonaws.com

claims:
  repository:
    equals: acme/payments-api
  repository_owner:
    equals: acme
  # Only main, a tagged release, or the 'production' environment deploy -
  # never a pull_request and never an arbitrary branch or fork.
  sub:
    matches: '^repo:acme/payments-api:(ref:refs/heads/main|environment:production|ref:refs/tags/v[0-9].*)$'
  environment:
    equals: production
  runner_environment:
    equals: github-hosted
